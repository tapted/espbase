<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY Logs</title>
    <style>
        body { background: #121212; color: #d4d4d4; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1e1e1e; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        #status { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .status-connected { background: #1b5e20; color: #a5d6a7; }
        .status-rebooting { background: #e65100; color: #ffcc80; }
        .status-disconnected { background: #b71c1c; color: #ef9a9a; }
        #logs { flex: 1; overflow-y: auto; padding: 10px 20px; white-space: pre-wrap; word-wrap: break-word; }
        .log-line { border-bottom: 1px solid #222; padding: 2px 0; }
        .error { color: #f44747; }
        .warn { color: #cca700; }
        .info { color: #3794ff; }
    </style>
</head>
<body>
    <div id="header">
        <span>ESP32 Network Console</span>
        <span id="status" class="status-disconnected">Connecting...</span>
    </div>
    <div id="logs"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('status');
        let autoScroll = true;

        logsDiv.addEventListener('scroll', () => {
            autoScroll = (logsDiv.scrollTop + logsDiv.clientHeight >= logsDiv.scrollHeight - 10);
        });

        function setStatus(text, className) {
            statusDiv.textContent = text;
            statusDiv.className = className;
        }

        async function connectStream() {
            try {
                const response = await fetch('/stream');
                if (!response.ok) throw new Error('Network response was not ok');
                
                setStatus('Connected', 'status-connected');
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    let lines = buffer.split('\n');
                    
                    // Keep the last incomplete line fragment in the buffer
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        // Ignore heartbeat spaces
                        if (line.trim() === '') continue; 

                        const div = document.createElement('div');
                        div.className = 'log-line';
                        div.textContent = line;
                        
                        if (line.includes('E (')) div.classList.add('error');
                        else if (line.includes('W (')) div.classList.add('warn');
                        else if (line.includes('I (')) div.classList.add('info');

                        if (line.includes('OTA Success! Rebooting')) {
                            setStatus('Applying OTA & Rebooting...', 'status-rebooting');
                        }

                        logsDiv.appendChild(div);
                    }
                    if (autoScroll) window.scrollTo(0, document.body.scrollHeight);
                }
            } catch (err) {
                if (statusDiv.textContent !== 'Applying OTA & Rebooting...') {
                    setStatus('Connection Lost. Retrying...', 'status-disconnected');
                }
            }
            
            // Loop automatically if the stream breaks (reboot/crash)
            setTimeout(connectStream, 2000); 
        }

        connectStream();
    </script>
</body>
</html>
