<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY Logs</title>
    <style>
        body { background: #121212; color: #d4d4d4; font-family: monospace; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1e1e1e; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        #status { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .status-connected { background: #1b5e20; color: #a5d6a7; }
        .status-rebooting { background: #e65100; color: #ffcc80; }
        .status-disconnected { background: #b71c1c; color: #ef9a9a; }
        #logs { flex: 1; overflow-y: auto; padding: 10px 20px; white-space: pre-wrap; word-wrap: break-word; }
        .log-line { border-bottom: 1px solid #222; padding: 2px 0; }
        .error { color: #f44747; }
        .warn { color: #cca700; }
        .info { color: #3794ff; }
    </style>
</head>
<body>
    <div id="header">
        <span>ESP32 Diagnostics Console</span>
        <span id="status" class="status-disconnected">Connecting...</span>
    </div>
    <div id="logs"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('status');
        let autoScroll = true;

        // Detect manual scrolling to pause autoscroll
        logsDiv.addEventListener('scroll', () => {
            autoScroll = (logsDiv.scrollTop + logsDiv.clientHeight >= logsDiv.scrollHeight - 10);
        });

        function setStatus(text, className) {
            statusDiv.textContent = text;
            statusDiv.className = className;
        }

        const source = new EventSource('/stream');

        source.onopen = () => setStatus('Connected', 'status-connected');
        
        source.onerror = () => {
            // Only overwrite status if we aren't explicitly waiting for a reboot
            if (statusDiv.textContent !== 'Applying OTA & Rebooting...') {
                setStatus('Connection Lost. Retrying...', 'status-disconnected');
            }
        };

        source.onmessage = (event) => {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.textContent = event.data;
            
            if (event.data.includes('E (')) line.classList.add('error');
            else if (event.data.includes('W (')) line.classList.add('warn');
            else if (event.data.includes('I (')) line.classList.add('info');

            // Detect the OTA shutdown sequence
            if (event.data.includes('OTA Success! Rebooting')) {
                setStatus('Applying OTA & Rebooting...', 'status-rebooting');
            }

            logsDiv.appendChild(line);
            
            if (autoScroll) {
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        };
    </script>
</body>
</html>
